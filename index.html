<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urna Eletrônica</title>


    <style rel="stylesheet" href="style.css" ></style>
</head>
<body>
    
<div class="urna">
   <div class="display">
    <input type="text"
           id="numImput"
           class="num-dig"
           placeholder="--"
           maxlength="2"
           readonly >

           <div id="candidatoinfo">
                <img src="" alt="foto do candidato">
                 <p>Digite o número</p>    
           </div>
   </div>
    
    
    <div class="painel-btn">
        <div class="buttons">
            <button class="btn" onclick="addNumber(1)">1</button>
            <button class="btn" onclick="addNumber(2)">2</button>
            <button class="btn" onclick="addNumber(3)">3</button> 

            <button class="btn" onclick="addNumber(4)">4</button>
            <button class="btn" onclick="addNumber(5)">5</button>
            <button class="btn" onclick="addNumber(6)">6</button>

            <button class="btn" onclick="addNumber(7)">7</button>
            <button class="btn" onclick="addNumber(8)">8</button>                            
            <button class="btn" onclick="addNumber(9)">9</button>

            <div></div>
            <button class="btn" onclick="addNumber(0)">0</button>
            <div></div>                         
        </div>

        <div class="btn-acoes">

            <button class="btn-acao branco"  onclick="votoBranco()">Branco</button>
            <button class="btn-acao corrige"  onclick="corrige()">Corrige</button>
            <button class="btn-acao confirma"  onclick="confirma()">Confirma</button>                        
            
        </div>

    </div>


</div>

    <script src="script.js"></script>
</body>
</html>
